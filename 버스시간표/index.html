<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전북 시외버스 통합 안내</title>
<style>
  :root { --primary: #4f7eff; --bg: #0f1117; --card: #1a1d27; --text: #f0f2ff; --sub-text: #8b90a8; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); font-family: 'Pretendard', sans-serif; color: var(--text); padding: 20px 16px 100px; }
  .wrap { max-width: 520px; margin: 0 auto; }
  
  header { margin-bottom: 24px; }
  h1 { font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  h1 span { width: 8px; height: 8px; background: var(--primary); border-radius: 50%; }

  .label { font-size: 11px; color: var(--sub-text); letter-spacing: 0.1em; margin-bottom: 8px; text-transform: uppercase; }
  .origin-toggle { display: flex; background: var(--card); border-radius: 12px; padding: 4px; margin-bottom: 16px; gap: 4px; border: 0.5px solid rgba(255,255,255,0.08); }
  .origin-btn { flex: 1; padding: 12px; border: none; border-radius: 9px; background: transparent; color: var(--sub-text); font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.2s; }
  .origin-btn.active { background: var(--primary); color: #fff; box-shadow: 0 4px 12px rgba(79, 126, 255, 0.3); }

  .dest-wrap { background: var(--card); border-radius: 12px; padding: 16px; margin-bottom: 12px; border: 0.5px solid rgba(255,255,255,0.08); }
  .dest-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; }
  .dest-chip { padding: 8px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: #22263a; color: #c0c4d8; font-size: 12px; text-align: center; cursor: pointer; }
  .dest-chip.active { background: rgba(79,126,255,0.15); border-color: var(--primary); color: #7da5ff; font-weight: 600; }

  .hero { background: linear-gradient(145deg, #1a1d27, #151821); border-radius: 16px; padding: 20px; margin-bottom: 12px; border: 0.5px solid rgba(255,255,255,0.08); }
  .next-bus-card { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 24px 12px; text-align: center; }
  .next-time { font-size: 3.5rem; font-weight: 700; line-height: 1; margin-bottom: 8px; }
  .countdown { display: inline-block; background: #22263a; border-radius: 20px; padding: 6px 16px; font-size: 13px; font-weight: 600; color: #3dd68c; }

  .search-row { display: flex; gap: 8px; margin-top: 12px; }
  .search-row input { flex: 1; background: var(--card); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #fff; padding: 10px; color-scheme: dark; }
  .search-row button { padding: 0 16px; background: var(--primary); border: none; border-radius: 10px; color: #fff; font-weight: 600; cursor: pointer; }

  /* 플로팅 버튼 */
  .fab { position: fixed; bottom: 24px; right: 24px; background: var(--primary); color: white; border: none; padding: 14px 22px; border-radius: 30px; font-weight: 600; box-shadow: 0 8px 24px rgba(0,0,0,0.5); cursor: pointer; z-index: 100; }

  /* 전광판 스타일 모달 */
  .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: none; flex-direction: column; }
  .modal-header { padding: 16px; background: #111; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; }
  .board-title { color: #3dd68c; font-weight: bold; font-size: 18px; }
  .close-btn { color: #fff; font-size: 24px; background: none; border: none; cursor: pointer; }
  
  .table-container { flex: 1; overflow: auto; padding: 8px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 450px; }
  th { background: #1a1d27; color: #3dd68c; padding: 12px 8px; text-align: left; border: 1px solid #333; }
  td { padding: 10px 8px; border: 1px solid #333; vertical-align: top; }
  .row-name { color: #ffeb3b; font-weight: 600; width: 100px; }
  .row-times { line-height: 1.6; letter-spacing: 0.5px; }
  .passed { color: #444; }
</style>
</head>
<body>

<div class="wrap">
  <header><h1><span></span>버스시간표 찾기</h1></header>

  <div class="label">출발 터미널 선택</div>
  <div class="origin-toggle">
    <button class="origin-btn active" onclick="setOrigin('jeonju', this)">전주 출발</button>
    <button class="origin-btn" onclick="setOrigin('buan', this)">부안 출발</button>
  </div>

  <div class="dest-wrap">
    <div class="label">목적지 (행선지)</div>
    <div class="dest-grid" id="destGrid"></div>
  </div>

  <div class="hero">
    <div class="next-bus-card">
      <div class="label" id="heroRoute">노선을 선택하세요</div>
      <div class="next-time" id="nextTime">--:--</div>
      <div class="countdown" id="countdown">--</div>
    </div>
    <div class="search-row">
      <input type="time" id="searchTime">
      <button onclick="searchBus()">조회</button>
    </div>
  </div>
</div>

<button class="fab" onclick="openModal()">📋 사진처럼 전체보기</button>

<div class="modal" id="modal">
  <div class="modal-header">
    <div class="board-title" id="modalTitle">전북특별자치도 방면 운행시간표</div>
    <button class="close-btn" onclick="closeModal()">✕</button>
  </div>
  <div class="table-container">
    <table id="fullTable">
      <thead><tr><th>행선지</th><th>운행 시간</th></tr></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<script>
const data = {
  jeonju: [
    { name: "군산", times: ["06:00","06:20","06:35","07:00","07:25","07:40","08:15","08:30","08:40","21:00","21:30","22:00","22:50"] },
    { name: "익산·군산", times: ["05:50","06:15","06:30","06:35","06:50","07:00","07:15","07:16","07:25","16:25","16:50","17:15","17:30","17:55","18:15","18:40","19:05","19:35"] },
    { name: "군산대", times: ["07:45","08:10","08:45","09:15","09:54"] },
    { name: "금마·함열", times: ["07:32","08:44","13:18","13:32","14:15","15:30"] },
    { name: "정읍", times: ["06:30","06:50","07:10","07:20","07:30","07:40","08:20","08:30","08:50","09:00","17:40","18:10","18:30","19:10","19:40","20:00","20:20","20:40","21:40"] },
    { name: "고창(직통)", times: ["06:05","07:23","09:26","11:04","11:53","13:06","13:55","14:20","15:09","16:44","17:32","18:21","19:10","20:02","20:30"] },
    { name: "김제", times: ["06:10","06:30","06:45","07:20","08:00","08:50","09:25","10:00","10:20","11:00","11:20","12:00","12:40","13:20","13:45","14:10","14:40","15:10","15:25","16:10"] },
    { name: "부안(직통)", times: ["07:10","09:20","10:00","10:25","11:35","12:20","12:40","13:50","15:00","16:00","16:30","17:15","18:10","18:50","19:40"] },
    { name: "남원(직통)", times: ["07:07","07:17","07:27","07:57","08:57","09:20","09:42","10:12","10:42","11:14","11:57","12:12","12:42","13:52","14:27","14:42"] },
    { name: "무주·구천동", times: ["06:55","07:40","08:20","08:40","10:20","11:00","12:00","13:00","14:10","16:30","18:30","20:00"] },
    { name: "장계·장수", times: ["06:20","07:15","09:00","09:50","10:40","11:20","13:40","14:40","15:25","17:00","18:00","18:50","19:20","21:00"] }
  ],
  buan: [
    { name: "서울(강남)", times: ["07:00", "08:00", "09:00", "10:30", "12:30", "13:40", "14:50", "16:10", "17:50", "19:30"] },
    { name: "동서울", times: ["09:00", "14:00", "19:00"] },
    { name: "인천", times: ["09:40"] },
    { name: "전주(직통)", times: ["07:10", "08:00", "08:40", "09:40", "10:50", "11:55", "12:50", "13:15", "13:50", "14:40", "15:45", "16:40", "17:40", "18:40", "19:30"] },
    { name: "김제·전주", times: ["06:50", "08:25", "09:20", "10:10", "12:10", "13:55", "15:20", "17:10", "18:55", "20:35", "22:00"] },
    { name: "부산(사상)", times: ["07:30", "10:30", "13:20", "16:30"] }
  ]
};

let curOrigin = 'jeonju';
let curDestIdx = 0;

function toMin(t) { const [h,m]=t.split(':').map(Number); return h*60+m; }
function nowMin() { const n=new Date(); return n.getHours()*60+n.getMinutes(); }

function setOrigin(o, el) {
  curOrigin = o; curDestIdx = 0;
  document.querySelectorAll('.origin-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderDest(); updateUI();
}

function renderDest() {
  const grid = document.getElementById('destGrid');
  grid.innerHTML = data[curOrigin].map((r, i) => `<div class="dest-chip ${i===curDestIdx?'active':''}" onclick="setDest(${i})">${r.name}</div>`).join('');
}

function setDest(i) { curDestIdx = i; renderDest(); updateUI(); }

function updateUI() {
  const route = data[curOrigin][curDestIdx];
  const nm = nowMin();
  document.getElementById('heroRoute').textContent = `${curOrigin==='jeonju'?'전주':'부안'} → ${route.name}`;
  const idx = route.times.findIndex(t => toMin(t) >= nm);
  const timeEl = document.getElementById('nextTime');
  const pill = document.getElementById('countdown');

  if(idx === -1) {
    timeEl.textContent = "--:--"; pill.textContent = "운행 종료";
  } else {
    timeEl.textContent = route.times[idx];
    const diff = toMin(route.times[idx]) - nm;
    pill.textContent = diff <= 0 ? "잠시 후 출발" : `${diff}분 후 출발`;
  }
}

function openModal() {
  const nm = nowMin();
  const body = document.getElementById('tableBody');
  body.innerHTML = data[curOrigin].map(r => {
    const timeHTML = r.times.map(t => `<span class="${toMin(t) < nm ? 'passed' : ''}">${t}</span>`).join(' &nbsp; ');
    return `<tr><td class="row-name">${r.name}</td><td class="row-times">${timeHTML}</td></tr>`;
  }).join('');
  document.getElementById('modal').style.display = 'flex';
}

function closeModal() { document.getElementById('modal').style.display = 'none'; }

function searchBus() {
  const val = document.getElementById('searchTime').value;
  if(!val) return;
  const route = data[curOrigin][curDestIdx];
  const idx = route.times.findIndex(t => toMin(t) >= toMin(val));
  alert(idx === -1 ? "이후 버스가 없습니다." : `가장 빠른 버스: ${route.times[idx]}`);
}

renderDest(); updateUI();
setInterval(updateUI, 30000);
</script>
</body>
</html>
