<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>부안·전주 버스 통합 가이드</title>
<style>
  :root { --primary: #4f7eff; --bg: #0f1117; --card: #1a1d27; --text: #f0f2ff; --sub-text: #8b90a8; --accent: #3dd68c; --warning: #ffeb3b; }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); font-family: -apple-system, sans-serif; color: var(--text); padding-bottom: 90px; }
  
  .nav { display: flex; background: #000; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #333; }
  .nav-item { flex: 1; padding: 18px; text-align: center; font-weight: 700; font-size: 15px; color: var(--sub-text); cursor: pointer; }
  .nav-item.active { color: var(--primary); border-bottom: 3px solid var(--primary); background: rgba(79,126,255,0.05); }

  .main { padding: 16px; max-width: 600px; margin: 0 auto; }
  .section { display: none; }
  .section.active { display: block; }

  .search-box { background: linear-gradient(145deg, #1a1d27, #11141d); border-radius: 20px; padding: 20px; margin-bottom: 16px; border: 1px solid rgba(79,126,255,0.2); }
  .label { font-size: 11px; color: var(--sub-text); margin-bottom: 12px; display: block; font-weight: 600; letter-spacing: 1px; }
  
  .time-select-row { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
  .time-input { flex: 1; background: #22263a; border: 1px solid #333; border-radius: 12px; color: #fff; padding: 12px; font-size: 18px; font-weight: bold; color-scheme: dark; }
  .now-btn { padding: 12px; background: #333; border: none; border-radius: 12px; color: #ccc; font-size: 13px; cursor: pointer; min-width: 80px; }

  .result-display { border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px; min-height: 80px; }
  .bus-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
  .bus-row:last-child { border: none; }
  .bus-time { font-size: 26px; font-weight: 800; color: #fff; }
  .bus-meta { text-align: right; }
  .bus-rank { font-size: 11px; color: var(--sub-text); display: block; }
  .bus-wait { font-size: 15px; color: var(--accent); font-weight: 600; }

  .card { background: var(--card); border-radius: 18px; padding: 16px; margin-bottom: 16px; border: 1px solid rgba(255,255,255,0.05); }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
  .chip { padding: 14px 6px; background: #22263a; border-radius: 12px; font-size: 12px; text-align: center; border: 1px solid transparent; cursor: pointer; color: #c0c4d8; font-weight: 500; display: flex; flex-direction: column; justify-content: center; min-height: 54px; }
  .chip.active { background: rgba(79,126,255,0.15); border-color: var(--primary); color: var(--primary); font-weight: 700; }

  .cat-title { font-size: 14px; color: var(--warning); margin: 24px 0 12px; padding-left: 10px; border-left: 4px solid var(--warning); font-weight: 700; }
  .footer-btn { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--primary); color: white; border: none; padding: 16px 40px; border-radius: 40px; font-weight: 700; font-size: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); z-index: 100; cursor: pointer; }

  .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: none; flex-direction: column; }
  .modal-head { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
  .modal-body { flex: 1; overflow-y: auto; padding: 12px; }
  .full-table { width: 100%; border-collapse: collapse; color: #eee; font-size: 12px; margin-bottom: 50px; }
  .full-table td { border: 1px solid #222; padding: 12px 10px; vertical-align: top; }
  .t-dest { color: var(--warning); font-weight: 700; width: 100px; background: #111; }
  .t-times { letter-spacing: 0.5px; line-height: 1.8; }
</style>
</head>
<body>

<div class="nav">
  <div class="nav-item active" onclick="setTab('inter', this)">시외버스</div>
  <div class="nav-item" onclick="setTab('town', this)">시내버스</div>
</div>

<div class="main">
  <div class="search-box">
    <span class="label">조회 기준 시간</span>
    <div class="time-select-row">
      <input type="time" id="searchTime" class="time-input">
      <button class="now-btn" onclick="setToNow()">현재시간</button>
    </div>
    <div class="result-display" id="resArea">
      <div style="text-align:center; color:var(--sub-text); padding:10px;">노선을 선택하면 가장 빠른 정보가 표시됩니다.</div>
    </div>
  </div>

  <div id="view-inter" class="section active">
    <div class="card">
      <span class="label">출발지 선택</span>
      <div class="grid">
        <div class="chip active" onclick="setOrigin('jeonju', this)">전주터미널</div>
        <div class="chip" onclick="setOrigin('buan', this)">부안터미널</div>
      </div>
    </div>
    
    <div id="jeonjuCats">
      <div class="cat-title">수도권 · 충청 방면</div>
      <div class="grid" id="jeonju-cat-1"></div>
      <div class="cat-title">전남 · 경상 방면</div>
      <div class="grid" id="jeonju-cat-2"></div>
      <div class="cat-title">전북 권역 방면</div>
      <div class="grid" id="jeonju-cat-3"></div>
    </div>

    <div id="buanCats" style="display:none;">
      <div class="cat-title">부안발 시외버스</div>
      <div class="grid" id="buan-grid"></div>
    </div>
  </div>

  <div id="view-town" class="section">
    <div class="cat-title">격포 · 변산 · 내소사 방면</div>
    <div class="grid" id="town-cat-1"></div>
    <div class="cat-title">주산 · 줄포 · 곰소 · 흥덕 방면</div>
    <div class="grid" id="town-cat-2"></div>
    <div class="cat-title">백산 · 화호 · 정읍 방면</div>
    <div class="grid" id="town-cat-3"></div>
    <div class="cat-title">계화 · 돈지 · 기타 방면</div>
    <div class="grid" id="town-cat-4"></div>
  </div>
</div>

<button class="footer-btn" onclick="openAllRoutes()">전체 노선 시간표 보기</button>

<div class="modal" id="modal">
  <div class="modal-head">
    <div id="mTitle" style="font-weight:700; color:var(--accent); font-size:18px;">전체 시간표</div>
    <button onclick="closeModal()" style="background:none; border:none; color:#fff; font-size:30px;">✕</button>
  </div>
  <div class="modal-body" id="mBody"></div>
</div>

<script>
const busData = {
  inter: {

      // 수도권/충청
      { cat: 1, name: "서울남부(우)", times: ["05:45","06:25","06:45","07:05","07:35","08:05","08:45","09:05","09:25","10:05","10:25","11:25","11:45","12:45","13:15","13:45","14:15","14:45","15:25","15:45","16:45","17:15","17:45","18:15","19:25","19:45","20:15","20:45","21:15"] },
      { cat: 1, name: "서울남부(일)", times: ["06:05","08:25","09:45","10:45","11:05","12:15","15:05","16:15","18:45","19:05"] },
      { cat: 1, name: "수원(우)", times: ["08:20","10:00","16:20","18:10"] },
      { cat: 1, name: "안산(우)", times: ["08:30","10:35","14:35","16:30"] },
      { cat: 1, name: "인천·부천", times: ["08:05","10:05","12:05","14:10","16:00","18:20"] },

      { cat: 1, name: "유성·청주(우)", times: ["07:05","08:00","08:40","09:45","11:20","12:25","13:40","14:10","15:20","16:50","18:00","19:10"] },
      { cat: 1, name: "청주공항·강릉", times: ["09:05","16:40"] },
      { cat: 1, name: "이천·여주", times: ["09:00","13:10","17:50"] },

      { cat: 2, name: "동계·순창·강진", times: ["07:26","08:42","11:02","13:32","15:17","16:42","18:32","20:12"] },
      
      // 전북권역
      { cat: 3, name: "부안(직통)", times: ["07:10","09:20","10:00","10:25","11:35","12:20","12:40","13:50","15:00","16:00","16:30","17:15","18:10","18:50","19:40"] },
      { cat: 3, name: "격포·곰소", times: ["10:00","12:40","13:20","15:00"] },
      { cat: 3, name: "김제", times: ["06:10","06:30","06:45","07:20","08:00","08:50","09:25","10:00","10:20","11:00","11:20","12:00","12:40","13:20","13:45","14:10","14:40","15:10","15:25","16:10","16:50","17:20","18:00","18:40","19:15","20:00","20:30","21:10","22:00"] },
      { cat: 3, name: "정읍", times: ["06:30","06:50","07:10","07:20","07:30","07:40","08:20","08:30","08:50","09:00","09:30","09:40","10:00","10:20","10:30","11:20","11:50","12:20","12:50","13:20","14:00","14:50","15:10","15:30","16:10","16:20","16:40","17:10","17:40","18:10","18:30","19:10","19:40","20:00","20:20","20:40","21:40"] },
      { cat: 3, name: "고창(직통)", times: ["06:05","07:23","09:26","11:04","11:53","13:06","13:55","14:20","15:09","16:44","17:32","18:21","19:10","20:02","20:30"] },
      { cat: 3, name: "군산(무정차)", times: ["06:00","06:20","06:35","07:00","07:25","07:40","08:15","08:30","08:40","21:00","21:30","22:00","22:50"] },
      { cat: 3, name: "익산·군산", times: ["05:50","06:15","06:30","06:35","06:50","07:15","07:16","07:25","16:25","16:50","17:15","17:30","17:55","18:15","18:40","19:05","19:35"] },
      { cat: 3, name: "삼례·금마·여산", times: ["07:32","08:44","13:18","13:32","14:15","15:30","18:20"] },
      { cat: 3, name: "원평·태인·신태인", times: ["07:30","07:40","10:00","11:35","14:30","15:35","18:40","19:40"] }
    ],
    buan: [
      { name: "전주(직통)", times: ["07:10","08:00","08:40","09:40","10:50","11:55","12:50","13:15","13:50","14:40","15:45","16:40","17:40","18:40","19:30"] },
      { name: "서울(강남)", times: ["07:00","08:00","09:00","10:30","12:30","13:40","14:50","16:10","17:50","19:30"] },
      { name: "동서울", times: ["09:00","14:00","19:00"] },
      { name: "인천", times: ["09:40","18:20"] },
      { name: "광주(직행)", times: ["10:30","14:40","18:20"] },
      { name: "고창·흥덕", times: ["07:00","09:10","11:10","13:40","15:20","18:10"] },
      { name: "곰소·내소사", times: ["07:20","10:15","13:55","16:15","17:00"] },
      { name: "정읍", times: ["07:55","12:30","15:30","17:20","18:45","19:45"] },
      { name: "격포·변산", times: ["10:35","11:20","14:35"] }
    ]
  },
  town: [
    //
    { cat: 1, name: "격포(마실)", times: ["06:40","07:30","08:40","09:10","10:00","11:00","11:50","12:20","13:30","14:30","15:30","16:30","17:55"] },
    { cat: 1, name: "내소사(상서)", times: ["06:00","06:40","07:10","07:40","08:10","08:40","09:10","10:00","10:40","11:20","12:10","13:10","14:10","15:10","16:10","17:10","18:10"] },
    { cat: 1, name: "변산·격포", times: ["07:05","08:15","09:15","10:20","11:50","12:30","13:50","15:10","16:30","17:35"] },
    { cat: 1, name: "모항·운호", times: ["07:30","09:40","12:40","15:40","17:50"] },
    { cat: 2, name: "줄포·흥덕", times: ["06:20","06:50","07:30","08:00","08:50","09:40","10:30","11:20","12:10","13:00","14:10","15:00","15:50","16:40","17:30","18:20","19:10"] },
    { cat: 2, name: "곰소·염소", times: ["06:00","07:15","08:30","10:00","11:30","12:30","13:50","15:40","17:20","18:50"] },
    { cat: 2, name: "주산·신평", times: ["06:20","07:30","08:50","10:20","12:10","13:40","15:20","17:10","18:30"] },
    { cat: 3, name: "정읍(시내)", times: ["07:10","08:30","09:10","10:30","12:10","13:40","15:00","16:10","17:30","18:40"] },
    { cat: 3, name: "영원·백산", times: ["06:40","07:55","09:10","11:05","12:50","14:45","16:30","18:10"] },
    { cat: 3, name: "화호·신태인", times: ["07:15","08:45","11:20","14:20","17:15"] },
    { cat: 4, name: "계화·거화", times: ["06:30","07:30","08:50","10:30","12:30","14:30","16:30","18:25"] },
    { cat: 4, name: "돈지·창북", times: ["06:25","07:30","09:20","11:30","13:20","15:20","17:20"] },
    { cat: 4, name: "간척지·조포", times: ["07:10","08:30","09:50","11:30","13:10","14:30","15:50","17:10"] },
    { cat: 4, name: "개암사", times: ["08:20","10:40","13:40","16:20"] }
  ]
};

let curMode = 'inter';
let curOrigin = 'jeonju';

function timeToMin(t) { if(!t) return 0; const [h,m] = t.split(':').map(Number); return h*60+m; }

function setToNow() {
  const now = new Date();
  document.getElementById('searchTime').value = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
  clearRes();
}

function setTab(mode, el) {
  curMode = mode;
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('view-'+mode).classList.add('active');
  clearRes();
}

function clearRes() {
  document.getElementById('resArea').innerHTML = '<div style="text-align:center; color:var(--sub-text); padding:10px;">노선을 선택하면 가장 빠른 정보가 표시됩니다.</div>';
  document.querySelectorAll('.chip').forEach(c => {
    if(!c.onclick.toString().includes('setOrigin')) c.classList.remove('active');
  });
}

function setOrigin(o, el) {
  curOrigin = o;
  el.parentNode.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  
  if(o === 'jeonju') {
    document.getElementById('jeonjuCats').style.display = 'block';
    document.getElementById('buanCats').style.display = 'none';
  } else {
    document.getElementById('jeonjuCats').style.display = 'none';
    document.getElementById('buanCats').style.display = 'block';
  }
  clearRes();
}

function renderInterGrids() {
  // 전주 카테고리별 렌더링
  for(let i=1; i<=3; i++) {
    const g = document.getElementById('jeonju-cat-'+i);
    g.innerHTML = busData.inter.jeonju.filter(b => b.cat === i).map(b => 
      `<div class="chip" onclick="calcBus('inter', '${b.name}', this)">${b.name}</div>`
    ).join('');
  }
  // 부안 그리드 렌더링
  const bg = document.getElementById('buan-grid');
  bg.innerHTML = busData.inter.buan.map(b => 
    `<div class="chip" onclick="calcBus('inter', '${b.name}', this)">${b.name}</div>`
  ).join('');
}

function renderTownGrid() {
  for(let i=1; i<=4; i++) {
    const g = document.getElementById('town-cat-'+i);
    g.innerHTML = busData.town.filter(b => b.cat === i).map(b => 
      `<div class="chip" onclick="calcBus('town', '${b.name}', this)">${b.name}</div>`
    ).join('');
  }
}

function calcBus(mode, name, el) {
  document.querySelectorAll('.section.active .chip').forEach(c => {
    if(!c.onclick.toString().includes('setOrigin')) c.classList.remove('active');
  });
  el.classList.add('active');

  const refTime = timeToMin(document.getElementById('searchTime').value);
  const list = mode === 'inter' ? busData.inter[curOrigin] : busData.town;
  const bus = list.find(b => b.name === name);
  const valid = bus.times.filter(t => timeToMin(t) >= refTime).slice(0, 2);
  
  const res = document.getElementById('resArea');
  if(valid.length === 0) {
    res.innerHTML = `<div style="text-align:center; color:#ff5e6c; font-weight:bold; padding:10px;">이후 운행 정보가 없습니다.</div>`;
  } else {
    res.innerHTML = valid.map((t, idx) => `
      <div class="bus-row">
        <div class="bus-time">${t}</div>
        <div class="bus-meta">
          <span class="bus-rank">${idx===0?'가장 빠른 노선':'그 다음 노선'}</span>
          <span class="bus-wait">${timeToMin(t)-refTime}분 대기</span>
        </div>
      </div>
    `).join('');
  }
}

function openAllRoutes() {
  let h = '<table class="full-table">';
  if(curMode === 'inter') {
    busData.inter[curOrigin].forEach(r => h += `<tr><td class="t-dest">${r.name}</td><td class="t-times">${r.times.join(' &nbsp; ')}</td></tr>`);
  } else {
    busData.town.forEach(r => h += `<tr><td class="t-dest">${r.name}</td><td class="t-times">${r.times.join(' &nbsp; ')}</td></tr>`);
  }
  h += '</table>';
  document.getElementById('mTitle').innerText = curMode==='inter'?(curOrigin==='jeonju'?'전주발 시외 전체':'부안발 시외 전체'):'부안 시내버스 전체';
  document.getElementById('mBody').innerHTML = h;
  document.getElementById('modal').style.display = 'flex';
}

function closeModal() { document.getElementById('modal').style.display = 'none'; }

setToNow();
renderInterGrids();
renderTownGrid();
</script>
</body>
</html>
